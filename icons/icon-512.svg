<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: warm terracotta -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4703a"/>
      <stop offset="100%" stop-color="#b85528"/>
    </linearGradient>
    <!-- Jar body gradient: cream highlight -->
    <linearGradient id="jar" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f2"/>
      <stop offset="100%" stop-color="#f0e8db"/>
    </linearGradient>
    <!-- Lid gradient -->
    <linearGradient id="lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8fa07e"/>
      <stop offset="100%" stop-color="#6b7c5c"/>
    </linearGradient>
    <!-- Star shine -->
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd97d"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <!-- Subtle inner shadow for jar -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComposite in="offset" in2="SourceAlpha" operator="in" result="shadow"/>
      <feColorMatrix in="shadow" type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.10  0 0 0 0.18 0" result="coloredShadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="coloredShadow"/>
      </feMerge>
    </filter>
    <filter id="softDrop">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2d2926" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle texture dots (very faint) -->
  <circle cx="60"  cy="60"  r="3" fill="#fff" opacity="0.06"/>
  <circle cx="452" cy="80"  r="4" fill="#fff" opacity="0.05"/>
  <circle cx="440" cy="440" r="3" fill="#fff" opacity="0.06"/>
  <circle cx="70"  cy="450" r="4" fill="#fff" opacity="0.05"/>
  <circle cx="256" cy="30"  r="2" fill="#fff" opacity="0.07"/>

  <!-- ── JAR (centered, slightly above center) ── -->
  <g filter="url(#softDrop)" transform="translate(256, 248)">

    <!-- Jar lid band / ring -->
    <rect x="-68" y="-118" width="136" height="18" rx="6" fill="url(#lid)" opacity="0.9"/>

    <!-- Lid top cap -->
    <rect x="-56" y="-136" width="112" height="26" rx="9" fill="url(#lid)"/>

    <!-- Lid knob -->
    <rect x="-14" y="-152" width="28" height="18" rx="6" fill="#7d9170"/>

    <!-- Jar body -->
    <rect x="-82" y="-100" width="164" height="188" rx="22" fill="url(#jar)" filter="url(#innerShadow)"/>

    <!-- Jar shoulder taper (top corners softened) -->
    <path d="M-82,-78 Q-82,-100 -60,-100 L60,-100 Q82,-100 82,-78 L82,-74 L-82,-74 Z"
      fill="url(#jar)" opacity="0.6"/>

    <!-- Jar highlight (gloss) -->
    <rect x="-60" y="-92" width="24" height="90" rx="12"
      fill="white" opacity="0.28"/>

    <!-- Jar label area (slightly warm) -->
    <rect x="-58" y="-48" width="116" height="80" rx="10"
      fill="#f5ede3" opacity="0.7"/>

    <!-- Stars on label — 5 small stars -->
    <g fill="url(#star)">
      <!-- star 1 -->
      <polygon points="-44,-20 -41,-11 -33,-11 -39,-5 -37,4 -44,0 -51,4 -49,-5 -55,-11 -47,-11"
        transform="scale(0.78)"/>
      <!-- star 2 -->
      <polygon points="-18,-20 -15,-11 -7,-11 -13,-5 -11,4 -18,0 -25,4 -23,-5 -29,-11 -21,-11"
        transform="scale(0.78)"/>
      <!-- star 3 (center, slightly bigger) -->
      <polygon points="8,-22 12,-11 24,-11 15,-3 18,9 8,3 -2,9 1,-3 -8,-11 4,-11"
        transform="scale(0.78)"/>
      <!-- star 4 -->
      <polygon points="34,-20 37,-11 45,-11 39,-5 41,4 34,0 27,4 29,-5 23,-11 31,-11"
        transform="scale(0.78)"/>
      <!-- star 5 -->
      <polygon points="60,-20 63,-11 71,-11 65,-5 67,4 60,0 53,4 55,-5 49,-11 57,-11"
        transform="scale(0.78)"/>
    </g>

    <!-- Label text line (abstract) -->
    <rect x="-40" y="12" width="80" height="6" rx="3" fill="#c4622d" opacity="0.35"/>
    <rect x="-28" y="24" width="56" height="5" rx="2.5" fill="#c4622d" opacity="0.22"/>

    <!-- Jar base / bottom edge highlight -->
    <rect x="-82" y="76" width="164" height="12" rx="0 0 22 22"
      fill="#d4c9bc" opacity="0.4"/>
  </g>

  <!-- ── "P&R" wordmark beneath ── -->
  <!-- Removed to keep icon clean at small sizes — logo type goes in the app header -->

</svg>
