<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4703a"/>
      <stop offset="100%" stop-color="#b85528"/>
    </linearGradient>
    <linearGradient id="jar2" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f2"/>
      <stop offset="100%" stop-color="#f0e8db"/>
    </linearGradient>
    <linearGradient id="lid2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8fa07e"/>
      <stop offset="100%" stop-color="#6b7c5c"/>
    </linearGradient>
    <linearGradient id="star2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd97d"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Icon badge -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="url(#bg2)"/>

  <!-- Jar group (scaled down, centered in badge) -->
  <g transform="translate(60, 62) scale(0.44)">
    <!-- Lid -->
    <rect x="-56" y="-136" width="112" height="26" rx="9" fill="url(#lid2)"/>
    <rect x="-68" y="-118" width="136" height="18" rx="6" fill="url(#lid2)" opacity="0.85"/>
    <rect x="-14" y="-152" width="28" height="18" rx="6" fill="#7d9170"/>
    <!-- Body -->
    <rect x="-82" y="-100" width="164" height="188" rx="22" fill="url(#jar2)"/>
    <!-- Gloss -->
    <rect x="-60" y="-92" width="22" height="85" rx="11" fill="white" opacity="0.28"/>
    <!-- Label -->
    <rect x="-58" y="-48" width="116" height="80" rx="10" fill="#f5ede3" opacity="0.7"/>
    <!-- Stars -->
    <g fill="url(#star2)" transform="scale(0.78)">
      <polygon points="-44,-20 -41,-11 -33,-11 -39,-5 -37,4 -44,0 -51,4 -49,-5 -55,-11 -47,-11"/>
      <polygon points="-18,-20 -15,-11 -7,-11 -13,-5 -11,4 -18,0 -25,4 -23,-5 -29,-11 -21,-11"/>
      <polygon points="8,-22 12,-11 24,-11 15,-3 18,9 8,3 -2,9 1,-3 -8,-11 4,-11"/>
      <polygon points="34,-20 37,-11 45,-11 39,-5 41,4 34,0 27,4 29,-5 23,-11 31,-11"/>
      <polygon points="60,-20 63,-11 71,-11 65,-5 67,4 60,0 53,4 55,-5 49,-11 57,-11"/>
    </g>
    <!-- Label lines -->
    <rect x="-38" y="14" width="76" height="7" rx="3.5" fill="#c4622d" opacity="0.35"/>
    <rect x="-26" y="26" width="52" height="6" rx="3" fill="#c4622d" opacity="0.22"/>
    <!-- Base -->
    <rect x="-82" y="76" width="164" height="12" rx="4" fill="#d4c9bc" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <!-- "Prep &" -->
  <text x="136" y="56"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42" font-weight="400"
    fill="#2d2926" letter-spacing="-0.5">Prep</text>

  <!-- Ampersand accent -->
  <text x="252" y="56"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42" font-style="italic"
    fill="#c4622d">&amp;</text>

  <!-- "Rate" -->
  <text x="282" y="56"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42" font-weight="400"
    fill="#2d2926" letter-spacing="-0.5"> Rate</text>

  <!-- Tagline -->
  <text x="137" y="80"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="15" font-weight="400"
    fill="#8a8278" letter-spacing="2.5">YOUR PERSONAL RECIPE JOURNAL</text>

  <!-- Subtle rule between icon and text -->
  <line x1="124" y1="20" x2="124" y2="100" stroke="#e8e2da" stroke-width="1.5"/>
</svg>
